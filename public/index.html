<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dividend Tracker" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/icon-192.png" />
  <title>Dividend Tracker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Dividend Tracker</h1>
  </header>

  <main>
    <section class="summary-grid" id="summary-grid" aria-live="polite">
      <div class="card">
        <span class="card-label">סה"כ הושקע</span>
        <span class="card-value" id="s-invested">–</span>
      </div>
      <div class="card">
        <span class="card-label">שווי נוכחי</span>
        <span class="card-value" id="s-current">–</span>
      </div>
      <div class="card">
        <span class="card-label">רווח/הפסד</span>
        <span class="card-value" id="s-gain">–</span>
      </div>
      <div class="card">
        <span class="card-label">תשואת דיבידנד שנתית</span>
        <span class="card-value" id="s-yield">–</span>
      </div>
      <div class="card">
        <span class="card-label">הכנסה חודשית ממוצעת</span>
        <span class="card-value" id="s-monthly">–</span>
      </div>
    </section>

    <section class="panel">
      <h2>מניות בתיק</h2>
      <div class="table-wrap">
        <table id="holdings-table">
          <thead>
            <tr>
              <th>טיקר</th>
              <th>מניות</th>
              <th>הושקע</th>
              <th>מחיר נוכחי</th>
              <th>שווי</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="holdings-body"></tbody>
        </table>
      </div>

      <form id="holding-form" class="inline-form">
        <input name="ticker" placeholder="טיקר (AAPL)" required maxlength="10" />
        <input name="shares" type="number" step="any" min="0" placeholder="כמות מניות" required />
        <input name="amount_invested" type="number" step="any" min="0" placeholder="סכום שהושקע (₪/$)" required />
        <input name="purchase_date" type="date" />
        <button type="submit">הוסף מניה</button>
      </form>
    </section>

    <section class="panel">
      <h2>תשלומי דיבידנד צפויים</h2>
      <ul id="upcoming-list" class="payment-list"></ul>

      <h3>כל התשלומים</h3>
      <ul id="all-payments-list" class="payment-list"></ul>

      <form id="dividend-form" class="inline-form">
        <input name="ticker" placeholder="טיקר (AAPL)" required maxlength="10" />
        <input name="amount_per_share" type="number" step="any" min="0" placeholder="סכום למניה" required />
        <input name="shares_at_payment" type="number" step="any" min="0" placeholder="כמות מניות בתשלום" />
        <input name="payment_date" type="date" required />
        <select name="status">
          <option value="expected">צפוי</option>
          <option value="paid">שולם</option>
        </select>
        <button type="submit">הוסף תשלום</button>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
